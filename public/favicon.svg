<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" width="100%" height="100%">
  <defs>
    <linearGradient id="trident-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circle decoration -->
  <circle cx="256" cy="256" r="220" fill="url(#trident-grad)" opacity="0.06" />
  <circle cx="256" cy="256" r="190" stroke="url(#trident-grad)" stroke-width="4" stroke-dasharray="12 12" opacity="0.2" />
  
  <!-- Stylized Trident -->
  <g filter="url(#glow)">
    <!-- Central Prong -->
    <path d="M256 90 L275 170 L256 190 L237 170 Z" fill="url(#trident-grad)" />
    <!-- Left Prong -->
    <path d="M180 150 L200 210 L188 230 L170 180 Z" fill="url(#trident-grad)" />
    <!-- Right Prong -->
    <path d="M332 150 L342 180 L324 230 L312 210 Z" fill="url(#trident-grad)" />
    
    <!-- Curved connection band -->
    <path d="M180 200 C 180 290, 332 290, 332 200 C 332 260, 285 285, 256 285 C 227 285, 180 260, 180 200 Z" fill="url(#trident-grad)" />
    
    <!-- Main Shaft -->
    <rect x="248" y="275" width="16" height="150" rx="8" fill="url(#trident-grad)" />
    <!-- Bottom Arrow/Spike -->
    <path d="M236 420 L256 448 L276 420 Z" fill="url(#trident-grad)" />
  </g>
</svg>